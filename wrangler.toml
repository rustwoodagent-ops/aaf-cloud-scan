name = "aaf-cloud-scan"
compatibility_date = "2026-04-23"
pages_build_output_dir = "public"

[[kv_namespaces]]
binding = "JOBS_KV"
id = "77b7bebfdc794b75981a82b85b6e09de"

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "0909a5e50e8d4fce8e7c906254ab3f66"

[vars]
PUBLIC_BASE_URL = "https://aaf-cloud-scan.pages.dev"
GITHUB_OWNER = "rustwoodagent-ops"
GITHUB_REPO = "aaf-cloud-scan"
GITHUB_WORKFLOW_FILE = "scan-job.yml"
GITHUB_WORKFLOW_REF = "main"
JOB_TTL_SECONDS = "604800"
MAX_REPO_SIZE_KB = "1000000"
MAX_FILE_COUNT = "12000"
MAX_PATH_DEPTH = "12"
MAX_EXTRACTED_SIZE_KB = "1200000"
RATE_LIMIT_WINDOW_SECONDS = "3600"
RATE_LIMIT_MAX_REQUESTS = "10"
CALLBACK_MAX_AGE_SECONDS = "300"
CALLBACK_FUTURE_SKEW_SECONDS = "60"
